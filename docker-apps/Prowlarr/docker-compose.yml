x-nexos:
  name: Prowlarr
  tagline:
    en: Indexer manager for all your *arr apps
    it: Gestore di indexer per tutte le tue app *arr
  description:
    en: Prowlarr is a centralized indexer manager and proxy built on the *arr stack. It integrates seamlessly with Radarr, Sonarr, Lidarr, Readarr and Mylar3, managing both Torrent Trackers and Usenet Indexers from a single place — no per-app indexer setup needed.
    it: Prowlarr è un gestore centralizzato di indexer e proxy basato sullo stack *arr. Si integra con Radarr, Sonarr, Lidarr, Readarr e Mylar3, gestendo Torrent Tracker e Usenet Indexer da un unico pannello — nessuna configurazione separata per ogni app.
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/icon.svg
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/thumbnail.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/screenshot-2.png
  category: Media
  tags:
    - media
    - indexer
    - arr
    - torrent
    - usenet
  developer: Prowlarr Team
  version: latest
  license: GPL-3.0
  port: 9696
  arch:
    - amd64
    - arm64
  website: https://prowlarr.com
  repo: https://github.com/Prowlarr/Prowlarr
  support: https://wiki.servarr.com/prowlarr/troubleshooting
  docs: https://wiki.servarr.com/prowlarr
  env:
    - name: HOST_PORT
      description: Host port to expose Prowlarr on
      required: true
      default: "9696"
      type: number
      min: 1
      max: 65535
    - name: PUID
      description: User ID to run the process as
      required: false
      default: "1000"
      type: number
    - name: PGID
      description: Group ID to run the process as
      required: false
      default: "1000"
      type: number
    - name: TZ
      description: Timezone (e.g. Europe/Rome)
      required: false
      default: Europe/Rome
      placeholder: Europe/Rome
  volumes:
    - container: /config
      description: Prowlarr configuration and database
      required: true

name: prowlarr

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=???
      - PGID=???
      - TZ=???
    ports:
      - "${HOST_PORT}:9696"
    volumes:
      - ???:/config
    restart: unless-stopped
