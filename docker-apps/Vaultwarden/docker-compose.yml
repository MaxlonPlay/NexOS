x-nexos:
  name: Vaultwarden
  tagline:
    en: Lightweight self-hosted password manager compatible with Bitwarden
    it: Password manager self-hosted leggero compatibile con Bitwarden
  description:
    en: Vaultwarden is an unofficial Bitwarden server implementation written in Rust. It is fully compatible with all official Bitwarden clients (mobile, browser extension, desktop) while being much lighter on resources than the official server. Supports organizations, 2FA, attachments and the admin panel.
    it: Vaultwarden è un'implementazione non ufficiale del server Bitwarden scritta in Rust. È completamente compatibile con tutti i client ufficiali Bitwarden (mobile, estensione browser, desktop) ma molto più leggero del server ufficiale. Supporta organizzazioni, 2FA, allegati e pannello admin.
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/vaultwarden.svg
  thumbnail: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/vaultwarden.png
  screenshot_link:
    - https://getumbrel.github.io/umbrel-apps-gallery/vaultwarden/1.jpg
    - https://getumbrel.github.io/umbrel-apps-gallery/vaultwarden/2.jpg
    - https://getumbrel.github.io/umbrel-apps-gallery/vaultwarden/3.jpg
  category: Security
  tags:
    - password manager
    - bitwarden
    - security
    - 2fa
  developer: dani-garcia
  version: latest
  license: AGPL-3.0
  port: 80
  arch:
    - amd64
    - arm64
    - arm/v7
  website: https://github.com/dani-garcia/vaultwarden
  repo: https://github.com/dani-garcia/vaultwarden
  docs: https://github.com/dani-garcia/vaultwarden/wiki
  env:
    - name: HOST_PORT
      description: Host port to expose Vaultwarden on
      required: true
      default: "6821"
      type: number
      min: 1
      max: 65535
    - name: ADMIN_TOKEN
      description: Token for the /admin panel (Argon2id hash recommended)
      required: false
      sensitive: true
      hint: |
        Generate a secure token with:
        echo -n 'YOUR_PASSWORD' | argon2 $(openssl rand -hex 8) -e
        Leave empty to disable the admin panel.
  volumes:
    - container: /data
      description: Vaultwarden data directory (vault, attachments, database)
      required: true

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:80"
    environment:
      - ADMIN_TOKEN=???
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ???:/data
