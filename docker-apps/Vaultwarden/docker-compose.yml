  services:
    vaultwarden:
      image: vaultwarden/server:latest
      container_name: vaultwarden
      restart: always
      ports:
        - "6821:80"
      environment:
        - ADMIN_TOKEN=???
      volumes:
        - /etc/localtime:/etc/localtime:ro
        - ???:/data/
 
  x-nexos:
    name: Vaultwarden
    description: |
      Server compatibile con i client Bitwarden ufficiali.
      Gestione password self-hosted, leggero e completo.
      Supporta app mobile, browser extension e desktop client.
    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/vaultwarden.svg
    thumbnail: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/vaultwarden.png
    screenshots:
      - https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/vaultwarden.png
      - https://raw.githubusercontent.com/dani-garcia/vaultwarden/main/resources/screenshots/vault.png
    category: sicurezza
    developer: dani-garcia
    env:
      - name: ADMIN_TOKEN
        description: Token Argon2id per il pannello /admin
        required: true
        sensitive: true
        hint: |
          Genera con il comando:
          echo -n 'LA_TUA_PASSWORD' | argon2 $(openssl rand -hex 8) -e
    volumes:
      - container: /data/
        description: Directory principale dati
        required: true