x-nexos:
  name: Apache Guacamole
  tagline:
    en: Clientless remote desktop gateway — RDP, VNC and SSH in the browser
    it: Gateway desktop remoto senza client — RDP, VNC e SSH nel browser
  description:
    en: Apache Guacamole lets you access remote machines (RDP, VNC, SSH) through any HTML5 browser — no client software needed. This all-in-one image bundles the web app, the native proxy daemon and the database in a single container. After install open http://YOUR_IP:PORT/guacamole and log in with guacadmin / guacadmin — change the password immediately.
    it: Apache Guacamole permette di accedere a macchine remote (RDP, VNC, SSH) da qualsiasi browser HTML5 senza installare client. Questa immagine all-in-one include webapp, daemon proxy e database in un unico container. Dopo l'installazione apri http://TUO_IP:PORT/guacamole e accedi con guacadmin / guacadmin — cambia subito la password.
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/guacamole-light.webp
  category: Remote Access
  tags:
    - remote desktop
    - rdp
    - vnc
    - ssh
    - browser
    - gateway
  developer: Apache Software Foundation
  version: latest
  license: Apache-2.0
  port: 8080
  arch:
    - amd64
    - arm64
  website: https://guacamole.apache.org
  repo: https://github.com/apache/guacamole-server
  docs: https://guacamole.apache.org/doc/gug/
  env:
    - name: HOST_PORT
      description: Host port for the Guacamole web interface
      required: true
      default: "8080"
      type: number
      min: 1
      max: 65535
    - name: TZ
      description: Server timezone
      required: false
      default: Europe/Rome
  features:
    - id: totp
      name:
        en: TOTP Two-Factor Authentication
        it: Autenticazione a due fattori TOTP
      description:
        en: Enables TOTP two-factor authentication (Google Authenticator, Authy, etc.). Users will be prompted to enroll on first login.
        it: Abilita l'autenticazione a due fattori TOTP (Google Authenticator, Authy, ecc.). Gli utenti verranno invitati a registrarsi al primo accesso.
      default: false
  volumes:
    - container: /config
      description: Guacamole configuration, database and extensions
      required: true

version: "3"

services:
  guacamole:
    image: flcontainers/guacamole
    container_name: guacamole
    environment:
      - TZ=${TZ}
# x-nexos-if: totp
      - EXTENSIONS=auth-totp
# x-nexos-endif
    ports:
      - "${HOST_PORT}:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ???:/config
    restart: unless-stopped
