x-nexos:
  name: Nextcloud AIO
  tagline:
    en: Complete personal cloud — files, docs, calendar, contacts and more
    it: Cloud personale completo con documenti, foto, calendario e molto altro
  description:
    en: Nextcloud All-in-One is the official solution for a complete private cloud. Includes files, Office documents, calendar, contacts, video calls and dozens of additional apps — all in a single container that automatically manages all internal services.
    it: Nextcloud All-in-One è la soluzione ufficiale per un cloud privato completo. Include file, documenti Office, calendario, contatti, videochiamate e decine di app aggiuntive — tutto in un unico container che gestisce automaticamente tutti i servizi interni.
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/nextcloud.svg
  screenshot_link:
    - https://nextcloud.com/c/uploads/2026/06/hub26-spring-desktop-clients.jpg
    - https://nextcloud.com/c/uploads/2026/06/Hub26-Spring-Accessibility-appearance.jpg
    - https://nextcloud.com/c/uploads/2026/06/Hub26-spring-File-versioning.jpg
    - https://nextcloud.com/c/uploads/2026/06/Nextcloud-iOS-app.png
  category: Cloud & Storage
  developer: Nextcloud GmbH
  version: latest
  license: AGPL-3.0
  port: 8080
  arch:
    - amd64
    - arm64
  tags:
    - cloud
    - storage
    - office
    - collaboration
    - photos
  website: https://nextcloud.com
  repo: https://github.com/nextcloud/all-in-one
  docs: https://github.com/nextcloud/all-in-one#how-to-use-this
  env:
    - name: AIO_HTTP_PORT
      description: Port for the AIO admin interface
      required: true
      default: "8080"
      type: number
      min: 1
      max: 65535
    - name: APACHE_PORT
      description: Port on which Nextcloud is exposed by Apache
      hint: Must be free on the host. Usually 11000 or any high port of your choice.
      required: true
      default: "11000"
      type: number
      min: 1024
      max: 65535
    - name: NEXTCLOUD_CONFIG_DIR
      description: Host folder for Nextcloud AIO configuration
      hint: "E.g. /opt/nextcloud/config — must exist before starting."
      path: true
      required: true
    - name: NEXTCLOUD_DATADIR
      description: Host folder where Nextcloud stores user files
      hint: "Choose a folder on a large disk. E.g. /mnt/storage/nextcloud/data"
      path: true
      required: true

version: "3.8"

services:
  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    container_name: nextcloud-aio-mastercontainer
    restart: always
    ports:
      - "${AIO_HTTP_PORT}:8080"
    environment:
      - APACHE_PORT=???
      - APACHE_IP_BINDING=0.0.0.0
      - SKIP_DOMAIN_VALIDATION=true
      - NEXTCLOUD_DATADIR=???
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
    driver_opts:
      type: none
      o: bind
      device: ${NEXTCLOUD_CONFIG_DIR}